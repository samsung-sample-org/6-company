# =============================================================================
# Docker Compose: Spring Boot 앱 + Oracle XE 21
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # 애플리케이션 서비스
  # ---------------------------------------------------------------------------
  app:
    build: .
    container_name: company-intro-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        # Oracle 시작에 시간이 걸리므로 DB가 healthy 상태가 된 후 앱을 시작한다.
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  # ---------------------------------------------------------------------------
  # 데이터베이스 서비스
  # ---------------------------------------------------------------------------
  # Oracle XE 선택 이유:
  #   - 원본 시스템이 Oracle을 사용하므로 동일한 DB 엔진으로 검증한다.
  #   - ojdbc14(Oracle 10g) → ojdbc11(Oracle 21c) 드라이버 전환을 검증하기 위함이다.
  #
  # gvenzl/oracle-xe 이미지:
  #   - Gerald Venzl이 관리하는 경량 Oracle XE Docker 이미지이다.
  #   - 공식 Oracle 이미지 대비 크기가 작고 설정이 간편하다.
  db:
    image: gvenzl/oracle-xe:21-slim
    container_name: company-intro-db
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
    # healthcheck 설명:
    #   Oracle XE는 컨테이너 시작 후 초기화에 수십 초가 소요된다.
    #   healthcheck를 통해 DB가 완전히 준비된 후 앱 컨테이너가 시작되도록 보장한다.
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
