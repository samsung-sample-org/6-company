# Docker 프로파일: Oracle XE 연결
spring:
  datasource:
    url: jdbc:oracle:thin:@db:1521:XE
    driver-class-name: oracle.jdbc.OracleDriver
    username: system
    password: oracle
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
  h2:
    console:
      enabled: false
